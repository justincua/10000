<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EA Realtime Dashboard</title>
  <style>
    :root {
      --bg: #0b1020;
      --bg2: #121a30;
      --card: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.12);
      --text: #ecf1ff;
      --muted: #99a5c7;
      --green: #20d38a;
      --red: #ff6b6b;
      --yellow: #ffd166;
      --blue: #7ab8ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(57,102,255,0.24), transparent 28%),
        radial-gradient(circle at top left, rgba(13,183,140,0.18), transparent 24%),
        linear-gradient(180deg, #0b1020 0%, #0e1529 100%);
      color: var(--text);
    }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 18px; }
    .topbar {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 14px;
      align-items: stretch;
      margin-bottom: 16px;
    }
    .panel, .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 50px rgba(0,0,0,0.25);
    }
    .panel { padding: 16px; }
    .title { font-weight: 800; font-size: 22px; margin: 0 0 8px; }
    .sub { color: var(--muted); font-size: 13px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .stat {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 12px;
    }
    .stat .k { color: var(--muted); font-size: 12px; }
    .stat .v { font-size: 22px; font-weight: 800; margin-top: 6px; }
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    input, button, select {
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }
    input::placeholder { color: #7d89a8; }
    button { cursor: pointer; font-weight: 700; }
    button:hover { filter: brightness(1.08); }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .bot-card { padding: 14px; }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }
    .name { font-size: 18px; font-weight: 800; }
    .sym { color: var(--blue); font-size: 13px; font-weight: 700; }
    .badge {
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .online { background: rgba(32,211,138,0.14); color: var(--green); }
    .offline { background: rgba(255,107,107,0.14); color: var(--red); }
    .status { background: rgba(255,209,102,0.12); color: var(--yellow); }
    .kv {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 10px 0;
    }
    .kv .item {
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .k { color: var(--muted); font-size: 12px; }
    .v { margin-top: 6px; font-size: 16px; font-weight: 800; }
    .good { color: var(--green); }
    .bad { color: var(--red); }
    .muted { color: var(--muted); }
    .line { height: 1px; background: var(--line); margin: 12px 0; }
    .cmds {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .cmds button { padding: 9px 10px; font-size: 12px; }
    .small { font-size: 12px; color: var(--muted); }
    .history {
      max-height: 220px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 8px;
      margin-top: 8px;
      background: rgba(0,0,0,0.12);
    }
    .history table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .history th, .history td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.06); text-align: left; }
    .empty {
      padding: 30px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
    }
    @media (max-width: 1080px) {
      .topbar, .grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      .wrap { padding: 12px; }
      .stats, .kv, .cmds { grid-template-columns: 1fr 1fr; }
      .title { font-size: 19px; }
      .v { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="panel">
        <div class="title">Dashboard nhận dữ liệu EA realtime</div>
        <div class="sub">EA gửi vào là server tạo file kiểu <b>TENBOT_16042026.json</b>. Giao diện đọc lại file ngày hiện tại để hiển thị và cập nhật ngay.</div>
        <div class="toolbar">
          <input id="searchInput" placeholder="Tìm bot / symbol / account" />
          <input id="pinInput" placeholder="Admin PIN" />
          <button id="refreshBtn">Làm mới</button>
          <button id="todayBtn">Hôm nay</button>
          <span id="liveText" class="small">Đang kết nối realtime...</span>
        </div>
      </div>
      <div class="panel">
        <div class="title">Tổng quan</div>
        <div class="stats">
          <div class="stat"><div class="k">Tổng bot</div><div class="v" id="sumTotal">0</div></div>
          <div class="stat"><div class="k">Online</div><div class="v" id="sumOnline">0</div></div>
          <div class="stat"><div class="k">Tổng balance</div><div class="v" id="sumBalance">0</div></div>
          <div class="stat"><div class="k">Lãi thực</div><div class="v" id="sumProfit">0</div></div>
          <div class="stat"><div class="k">Floating</div><div class="v" id="sumFloating">0</div></div>
        </div>
      </div>
    </div>

    <div id="cards" class="grid"></div>
  </div>

  <script>
    const cardsEl = document.getElementById('cards');
    const searchInput = document.getElementById('searchInput');
    const pinInput = document.getElementById('pinInput');
    const refreshBtn = document.getElementById('refreshBtn');
    const todayBtn = document.getElementById('todayBtn');
    const liveText = document.getElementById('liveText');

    const fmt = new Intl.NumberFormat('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 });
    let rows = [];
    let rowMap = new Map();

    function escapeHtml(text) {
      return String(text ?? '').replace(/[&<>"']/g, (ch) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));
    }
    function safeId(text) {
      return String(text ?? '').replace(/[^a-zA-Z0-9_-]/g, '_');
    }
    function money(v) {
      const n = Number(v || 0);
      return fmt.format(n);
    }
    function ago(sec) {
      const n = Math.max(0, Number(sec || 0));
      if (n < 60) return `${n}s trước`;
      const m = Math.floor(n / 60);
      if (m < 60) return `${m}m trước`;
      const h = Math.floor(m / 60);
      return `${h}h trước`;
    }
    function signalTag(v) {
      if (Number(v) === 1) return '<span class="good">BUY</span>';
      if (Number(v) === -1) return '<span class="bad">SELL</span>';
      return '<span class="muted">WAIT</span>';
    }
    async function api(url, opts = {}) {
      const headers = { ...(opts.headers || {}) };
      if (pinInput.value.trim()) headers['x-admin-pin'] = pinInput.value.trim();
      const res = await fetch(url, { ...opts, headers });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }
    async function loadOverview() {
      const data = await api('/api/overview');
      rows = Array.isArray(data.rows) ? data.rows : [];
      rowMap = new Map(rows.map(r => [String(r.fileName), r]));
      render();
    }
    async function sendCommand(row, cmd) {
      await api('/api/command', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bot: row.bot, symbol: row.symbol, accountId: row.accountId, cmd })
      });
      alert(`Đã gửi lệnh ${cmd} cho ${row.bot}`);
    }
    async function showHistory(fileName) {
      const data = await api(`/api/file/${encodeURIComponent(fileName)}`);
      const hist = (data.history || []).slice(-20).reverse();
      const target = document.getElementById(`history-${safeId(fileName)}`);
      if (!target) return;
      target.innerHTML = `
        <table>
          <thead><tr><th>TS</th><th>Profit</th><th>Floating</th><th>DD</th><th>Orders</th></tr></thead>
          <tbody>
            ${hist.map(h => `
              <tr>
                <td>${new Date(Number(h.ts || 0) * 1000).toLocaleTimeString()}</td>
                <td class="${Number(h.realProfit) >= 0 ? 'good' : 'bad'}">${money(h.realProfit)}</td>
                <td class="${Number(h.floating) >= 0 ? 'good' : 'bad'}">${money(h.floating)}</td>
                <td>${money(h.dd)}%</td>
                <td>${Number(h.total || 0)}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    }
    function renderSummary(filtered) {
      const total = filtered.length;
      const online = filtered.filter(r => r.isOnline).length;
      const balance = filtered.reduce((s, r) => s + Number(r.metrics?.balance || 0), 0);
      const profit = filtered.reduce((s, r) => s + Number(r.metrics?.realProfit || 0), 0);
      const floating = filtered.reduce((s, r) => s + Number(r.metrics?.floating || 0), 0);
      document.getElementById('sumTotal').textContent = total;
      document.getElementById('sumOnline').textContent = online;
      document.getElementById('sumBalance').textContent = money(balance);
      document.getElementById('sumProfit').textContent = money(profit);
      document.getElementById('sumFloating').textContent = money(floating);
    }
    function render() {
      const q = searchInput.value.trim().toLowerCase();
      const filtered = rows.filter(r => {
        const text = `${r.bot} ${r.symbol} ${r.accountId} ${r.status}`.toLowerCase();
        return !q || text.includes(q);
      });
      renderSummary(filtered);
      if (!filtered.length) {
        cardsEl.innerHTML = '<div class="empty">Chưa có bot nào gửi dữ liệu hôm nay.</div>';
        return;
      }
      cardsEl.innerHTML = filtered.map(row => {
        const m = row.metrics || {};
        const p = row.positions || {};
        const s = row.signals || {};
        const fileId = safeId(row.fileName);
        return `
          <div class="card bot-card">
            <div class="head">
              <div>
                <div class="name">${escapeHtml(row.bot)}</div>
                <div class="sym">${escapeHtml(row.symbol)} · ID ${escapeHtml(row.accountId)}</div>
              </div>
              <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;">
                <span class="badge ${row.isOnline ? 'online' : 'offline'}">${escapeHtml(row.onlineText)}</span>
                <span class="badge status">${escapeHtml(row.status || 'UNKNOWN')}</span>
              </div>
            </div>
            <div class="kv">
              <div class="item"><div class="k">Balance</div><div class="v">${money(m.balance)}</div></div>
              <div class="item"><div class="k">Equity</div><div class="v">${money(m.equity)}</div></div>
              <div class="item"><div class="k">Lãi thực</div><div class="v ${Number(m.realProfit) >= 0 ? 'good' : 'bad'}">${money(m.realProfit)} (${money(m.realPct)}%)</div></div>
              <div class="item"><div class="k">Floating</div><div class="v ${Number(m.floating) >= 0 ? 'good' : 'bad'}">${money(m.floating)}</div></div>
              <div class="item"><div class="k">Drawdown</div><div class="v ${Number(m.dd) > 0 ? 'bad' : ''}">${money(m.dd)}%</div></div>
              <div class="item"><div class="k">Target / Remain</div><div class="v">${money(m.target)} / ${money(m.remain)}</div></div>
              <div class="item"><div class="k">Lệnh</div><div class="v">BUY ${p.buy || 0} · SELL ${p.sell || 0} · TOTAL ${p.total || 0}</div></div>
              <div class="item"><div class="k">Tín hiệu</div><div class="v">M5 ${signalTag(s.m5)} · M1 ${signalTag(s.m1)} · All ${signalTag(s.all)}</div></div>
            </div>
            <div class="small">Action: ${escapeHtml(row.action || '-')}<br>Hedge: ${escapeHtml(row.hedge || '-')}<br>File: <b>${escapeHtml(row.fileName)}</b> · cập nhật ${ago(row.ageSec)}</div>
            <div class="line"></div>
            <div class="cmds">
              <button data-file="${escapeHtml(row.fileName)}" data-cmd="close_all">Close all</button>
              <button data-file="${escapeHtml(row.fileName)}" data-cmd="close_buy">Close buy</button>
              <button data-file="${escapeHtml(row.fileName)}" data-cmd="close_sell">Close sell</button>
              <button data-file="${escapeHtml(row.fileName)}" data-cmd="close_loss">Close loss</button>
              <button data-file="${escapeHtml(row.fileName)}" data-cmd="pause">Pause</button>
              <button data-file="${escapeHtml(row.fileName)}" data-cmd="resume">Resume</button>
            </div>
            <div class="line"></div>
            <button data-toggle-history="${escapeHtml(row.fileName)}">Xem 20 heartbeat gần nhất</button>
            <div id="history-${fileId}" class="history" style="display:none"></div>
          </div>`;
      }).join('');
    }

    cardsEl.addEventListener('click', async (event) => {
      const cmdBtn = event.target.closest('[data-cmd]');
      if (cmdBtn) {
        const row = rowMap.get(cmdBtn.getAttribute('data-file'));
        const cmd = cmdBtn.getAttribute('data-cmd');
        if (!row) return;
        const map = { pause: 'time_off', resume: 'time_on' };
        try {
          await sendCommand(row, map[cmd] || cmd);
        } catch (e) {
          alert(`Gửi lệnh lỗi: ${e.message}`);
        }
        return;
      }
      const historyBtn = event.target.closest('[data-toggle-history]');
      if (historyBtn) {
        const fileName = historyBtn.getAttribute('data-toggle-history');
        const id = `history-${safeId(fileName)}`;
        const box = document.getElementById(id);
        if (!box) return;
        const isHidden = box.style.display === 'none';
        box.style.display = isHidden ? 'block' : 'none';
        if (isHidden) await showHistory(fileName);
      }
    });

    function initSSE() {
      const es = new EventSource('/events');
      es.addEventListener('ready', () => {
        liveText.textContent = 'Realtime đang hoạt động';
      });
      es.addEventListener('heartbeat', async () => {
        liveText.textContent = 'Vừa nhận heartbeat mới';
        await loadOverview();
      });
      es.addEventListener('ack', async () => {
        liveText.textContent = 'EA vừa ack lệnh';
        await loadOverview();
      });
      es.onerror = () => {
        liveText.textContent = 'Mất realtime, đang fallback poll 2 giây';
      };
      setInterval(loadOverview, 2000);
    }

    refreshBtn.addEventListener('click', loadOverview);
    todayBtn.addEventListener('click', loadOverview);
    searchInput.addEventListener('input', render);

    loadOverview().then(initSSE);
  </script>
</body>
</html>
