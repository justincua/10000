<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Page</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #4CAF50; color: white; padding: 1rem; text-align: center; }
        .container { padding: 20px; }
        .calendar { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .day { border: 1px solid #ccc; padding: 10px; text-align: center; }
        @media (max-width: 600px) {
            .container { padding: 10px; }
            .calendar { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Monthly Metrics</h1>
    </header>
    <div class="container">
        <div class="calendar">
            <div class="day">
                <strong>1</strong><br>
                Bot1: DD, $<br>
                Bot2: DD, $<br>
            </div>
            <div class="day">
                <strong>2</strong><br>
                Bot1: DD, $<br>
                Bot2: DD, $<br>
            </div>
            <!-- Add further days as needed -->
        </div>
    </div>
</body>
</html>
