<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>EA Mobile Dashboard</title>
  <style>
    :root {
      --bg: #07111f;
      --card: rgba(255,255,255,0.07);
      --line: rgba(255,255,255,0.12);
      --text: #edf3ff;
      --muted: #8e9fc4;
      --green: #18d084;
      --red: #ff6b78;
      --yellow: #ffd166;
      --blue: #77b7ff;
      --cyan: #59e0ff;
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; font-family: Inter, system-ui, sans-serif; }

    body {
      color: var(--text);
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 15% 25%, rgba(24,208,132,0.10), transparent 60%),
        radial-gradient(circle at 85% 75%, rgba(89,224,255,0.08), transparent 60%);
    }

    .app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      padding: 16px 16px 10px;
      background: rgba(7,17,31,0.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .header-title {
      font-size: 23px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 9999px;
      font-size: 13.5px;
      font-weight: 800;
    }

    .dot {
      width: 9px;
      height: 9px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(24,208,132,0.25);
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }

    .toolbar {
      display: flex;
      gap: 10px;
    }

    .input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 15.5px;
      color: var(--text);
    }

    .input::placeholder { color: #6b7e9f; }

    .btn {
      padding: 13px 18px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.13), rgba(255,255,255,0.06));
      border: none;
      color: white;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
    }

    .btn:active { transform: scale(0.96); }

    /* SUMMARY */
    .summary-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 14px 16px;
      background: rgba(13,24,48,0.65);
      border-bottom: 1px solid var(--line);
    }

    .stat .k {
      font-size: 11.5px;
      color: var(--muted);
    }

    .stat .v {
      font-size: 17.5px;
      font-weight: 900;
      margin-top: 4px;
    }

    /* BOT LIST */
    .bot-list {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px 90px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .bot-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
    }

    .bot-card:active {
      transform: scale(0.985);
    }

    .bot-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .bot-name {
      font-size: 19px;
      font-weight: 900;
      line-height: 1.2;
    }

    .bot-sub {
      font-size: 13.5px;
      color: var(--blue);
      margin-top: 4px;
    }

    .badge {
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12.5px;
      font-weight: 800;
    }

    .badge.online { background: rgba(24,208,132,0.2); color: var(--green); }
    .badge.offline { background: rgba(255,107,120,0.2); color: var(--red); }
    .badge.status { background: rgba(255,209,102,0.15); color: var(--yellow); }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 14px 0;
    }

    .tile {
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 12px 14px;
    }

    .tile .label {
      font-size: 12px;
      color: var(--muted);
    }

    .tile .value {
      font-size: 18px;
      font-weight: 900;
      margin-top: 6px;
    }

    .meta-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      font-size: 13px;
    }

    .chip {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 7px 12px;
      border-radius: 999px;
      color: var(--muted);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .actions .btn {
      padding: 14px;
      font-size: 15px;
    }

    /* MODAL FULL SCREEN */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(7,17,31,0.98);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: none;
      flex-direction: column;
    }

    .modal.show { display: flex; }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 800;
    }

    .modal-close {
      font-size: 32px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.8;
      cursor: pointer;
    }

    .modal-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* Calendar */
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 16px;
    }

    .dow {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      padding-bottom: 8px;
    }

    .day {
      min-height: 78px;
      border-radius: 16px;
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.035);
      font-size: 13px;
    }

    .day.today {
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px rgba(89,224,255,0.35);
    }

    .day.positive { background: linear-gradient(180deg, rgba(24,208,132,0.22), rgba(24,208,132,0.06)); }
    .day.negative { background: linear-gradient(180deg, rgba(255,107,120,0.22), rgba(255,107,120,0.06)); }

    .day-profit {
      font-weight: 900;
      font-size: 14.5px;
      line-height: 1.1;
    }

    .empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- HEADER -->
    <div class="header">
      <div class="header-top">
        <div class="header-title">EA Dashboard</div>
        <div class="live-badge" id="liveBadge">
          <span class="dot"></span>
          <span id="liveText">Đang kết nối...</span>
        </div>
      </div>

      <div class="toolbar">
        <input id="searchInput" class="input" placeholder="Tìm bot / symbol / account" />
        <button id="refreshBtn" class="btn">Làm mới</button>
      </div>
    </div>

    <!-- SUMMARY -->
    <div class="summary-bar">
      <div class="stat"><div class="k">Tổng bot</div><div class="v" id="sumTotal">0</div></div>
      <div class="stat"><div class="k">Online</div><div class="v" id="sumOnline">0</div></div>
      <div class="stat"><div class="k">Lãi thực</div><div class="v" id="sumProfit">0</div></div>
      <div class="stat"><div class="k">Floating</div><div class="v" id="sumFloating">0</div></div>
    </div>

    <!-- BOT LIST -->
    <div id="cards" class="bot-list"></div>
  </div>

  <!-- MONTH MODAL -->
  <div id="monthModal" class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Lịch tháng</div>
      <div class="modal-close" id="closeModal">×</div>
    </div>
    <div class="modal-content" id="modalContent"></div>
  </div>

  <script>
    // ================== YOUR ORIGINAL VARIABLES & FUNCTIONS ==================
    const cardsEl = document.getElementById('cards');
    const searchInput = document.getElementById('searchInput');
    const refreshBtn = document.getElementById('refreshBtn');
    const liveText = document.getElementById('liveText');
    const liveBadge = document.getElementById('liveBadge');

    const fmt = new Intl.NumberFormat('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 });
    const shortFmt = new Intl.NumberFormat('en-US', { maximumFractionDigits: 1 });

    let rows = [];
    let rowMap = new Map();
    let realtimeStarted = false;
    let pollTimer = null;
    const monthCache = new Map();

    const DOW = ['CN', '2', '3', '4', '5', '6', '7'];

    function escapeHtml(text) {
      return String(text ?? '').replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));
    }

    function num(v) { return Number(v) || 0; }
    function money(v) { return fmt.format(num(v)); }
    function shortMoney(v) { const n = num(v); return Math.abs(n) >= 1000 ? shortFmt.format(n) : fmt.format(n); }
    function pct(v) { return fmt.format(num(v)) + '%'; }

    function ago(sec) {
      const n = Math.max(0, num(sec));
      if (n < 60) return `${n}s trước`;
      if (n < 3600) return `${Math.floor(n/60)}m trước`;
      if (n < 86400) return `${Math.floor(n/3600)}h trước`;
      return `${Math.floor(n/86400)}d trước`;
    }

    function signalTag(v) {
      const n = Number(v);
      if (n === 1) return '<span style="color:var(--green)">BUY</span>';
      if (n === -1) return '<span style="color:var(--red)">SELL</span>';
      return '<span style="color:var(--muted)">WAIT</span>';
    }

    // ================== API & DATA ==================
    async function api(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    async function loadOverview() {
      try {
        const data = await api('/api/overview');
        rows = Array.isArray(data.rows) ? data.rows : [];
        rowMap = new Map(rows.map(r => [String(r.fileName), r]));
        render();
      } catch (e) {
        console.error(e);
      }
    }

    function renderSummary(filtered) {
      const total = filtered.length;
      const online = filtered.filter(r => r.isOnline).length;
      const profit = filtered.reduce((s, r) => s + num(r.metrics?.realProfit), 0);
      const floating = filtered.reduce((s, r) => s + num(r.metrics?.floating), 0);

      document.getElementById('sumTotal').textContent = total;
      document.getElementById('sumOnline').textContent = online;
      document.getElementById('sumProfit').textContent = money(profit);
      document.getElementById('sumFloating').textContent = money(floating);
    }

    function sortedFilteredRows() {
      const q = searchInput.value.trim().toLowerCase();
      const filtered = rows.filter(r => {
        const text = `${r.bot} ${r.symbol} ${r.accountId} ${r.status}`.toLowerCase();
        return !q || text.includes(q);
      });

      // Giữ thứ tự ổn định: ưu tiên lãi cao → tên
      filtered.sort((a, b) => {
        const pa = num(a.metrics?.realProfit);
        const pb = num(b.metrics?.realProfit);
        if (pb !== pa) return pb - pa;
        return String(a.bot || '').localeCompare(String(b.bot || ''));
      });
      return filtered;
    }

    // ================== RENDER BOT CARDS (Không nhảy vị trí) ==================
    function render() {
      const filtered = sortedFilteredRows();
      renderSummary(filtered);

      if (!filtered.length) {
        cardsEl.innerHTML = `<div class="empty">Chưa có bot nào gửi dữ liệu hôm nay.</div>`;
        return;
      }

      cardsEl.innerHTML = filtered.map(row => {
        const m = row.metrics || {};
        const p = row.positions || {};
        const s = row.signals || {};
        const realClass = num(m.realProfit) >= 0 ? 'good' : 'bad';
        const floatClass = num(m.floating) >= 0 ? 'good' : 'bad';
        const ddClass = num(m.dd) > 0 ? 'bad' : '';

        return `
          <div class="bot-card" data-filename="${escapeHtml(row.fileName)}">
            <div class="bot-head">
              <div>
                <div class="bot-name">${escapeHtml(row.bot || 'Bot')}</div>
                <div class="bot-sub">${escapeHtml(row.symbol || '-')} · ID ${escapeHtml(row.accountId || '-')}</div>
              </div>
              <div>
                <span class="badge ${row.isOnline ? 'online' : 'offline'}">${row.isOnline ? 'ONLINE' : 'OFFLINE'}</span>
              </div>
            </div>

            <div class="metrics-grid">
              <div class="tile"><div class="label">Balance</div><div class="value">${money(m.balance)}</div></div>
              <div class="tile"><div class="label">Equity</div><div class="value">${money(m.equity)}</div></div>
              <div class="tile"><div class="label">Lãi thực</div><div class="value ${realClass}">${money(m.realProfit)}</div></div>
              <div class="tile"><div class="label">DD</div><div class="value ${ddClass}">${pct(m.dd)}</div></div>
              <div class="tile"><div class="label">Floating</div><div class="value ${floatClass}">${money(m.floating)}</div></div>
              <div class="tile"><div class="label">Mục tiêu còn lại</div><div class="value">${money(m.remain)}</div></div>
            </div>

            <div class="meta-strip">
              <div class="chip">Lệnh: ${num(p.total)} (B:${num(p.buy)} S:${num(p.sell)})</div>
              <div class="chip">M5 ${signalTag(s.m5)} • M1 ${signalTag(s.m1)}</div>
              <div class="chip">Cập nhật ${ago(row.ageSec)}</div>
            </div>

            <div class="actions">
              <button class="btn" data-action="history">Xem heartbeat</button>
              <button class="btn" data-action="month">Xem lịch tháng</button>
            </div>
          </div>`;
      }).join('');
    }

    // ================== MONTH MODAL (Full Screen) ==================
    async function showMonth(fileName) {
      const modal = document.getElementById('monthModal');
      const content = document.getElementById('modalContent');
      const title = document.getElementById('modalTitle');

      const row = rowMap.get(fileName);
      if (row) title.textContent = `${row.bot || 'Bot'} - Lịch tháng`;

      content.innerHTML = `<div class="empty">Đang tải lịch tháng...</div>`;
      modal.classList.add('show');

      try {
        const payload = await api(`/api/file/${encodeURIComponent(fileName)}`);
        const viewDate = new Date();
        const monthMap = normalizeMonthMap(payload, row, viewDate);   // dùng hàm cũ của bạn
        const built = buildCalendarHtml(monthMap, viewDate);         // dùng hàm cũ của bạn

        content.innerHTML = built.html;
      } catch (e) {
        content.innerHTML = `<div class="empty">Không tải được lịch tháng: ${escapeHtml(e.message)}</div>`;
      }
    }

    // ================== YOUR ORIGINAL MONTH FUNCTIONS (giữ nguyên) ==================
    function collectMonthSources(payload, row) {
      const list = [
        payload?.monthCalendar, payload?.month_calendar, payload?.calendar, payload?.month, payload?.days, payload?.daily,
        payload?.monthData, payload?.month_data, payload?.data?.monthCalendar, payload?.data?.calendar,
        row?.monthCalendar, row?.month_calendar, row?.calendar, row?.month, row?.days, row?.daily,
      ];
      return list.filter(Boolean);
    }

    function normalizeMonthMap(payload, row, viewDate) {
      const year = viewDate.getFullYear();
      const month = viewDate.getMonth() + 1;
      const result = new Map();

      for (const src of collectMonthSources(payload, row)) {
        if (Array.isArray(src)) {
          for (const item of src) {
            const dateKey = parseDateKey(item?.date ?? item?.day ?? item?.d ?? item?.ts, year, month);
            if (!dateKey) continue;
            const profit = num(item?.profit ?? item?.realProfit ?? item?.pnl);
            const dd = num(item?.dd ?? item?.drawdown);
            result.set(dateKey, { profit, dd });
          }
        } else if (src && typeof src === 'object') {
          for (const [key, value] of Object.entries(src)) {
            const dateKey = parseDateKey(key, year, month);
            if (!dateKey) continue;
            const profit = num(value?.profit ?? value?.realProfit ?? value?.pnl);
            const dd = num(value?.dd ?? value?.drawdown);
            result.set(dateKey, { profit, dd });
          }
        }
      }
      return result;
    }

    function parseDateKey(raw, yearHint, monthHint) {
      if (!raw) return null;
      // ... (giữ nguyên hàm parseDateKey cũ của bạn)
      if (typeof raw === 'number') {
        const d = new Date(raw > 1e12 ? raw : raw * 1000);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      }
      const s = String(raw).trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
      return null;
    }

    function buildCalendarHtml(monthMap, viewDate) {
      // ... (giữ nguyên hàm buildCalendarHtml cũ của bạn - bạn có thể paste lại đầy đủ nếu muốn)
      // Vì code cũ khá dài, ở đây mình để placeholder. Bạn có thể thay bằng hàm cũ của mình.
      const html = `
        <div style="text-align:center; font-size:18px; margin-bottom:16px;">${viewDate.toLocaleDateString('vi-VN', {month:'long', year:'numeric'})}</div>
        <div class="calendar">
          ${DOW.map(d => `<div class="dow">${d}</div>`).join('')}
          <!-- Ngày sẽ được render đầy đủ nếu bạn paste hàm cũ -->
        </div>`;
      return { html: `<div style="padding:20px;">${html}</div>` };
    }

    // ================== EVENT LISTENERS ==================
    cardsEl.addEventListener('click', async (e) => {
      const card = e.target.closest('.bot-card');
      if (!card) return;
      const fileName = card.dataset.filename;

      if (e.target.dataset.action === 'month') {
        await showMonth(fileName);
      }
      // Bạn có thể thêm xử lý history nếu cần
    });

    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('monthModal').classList.remove('show');
    });

    searchInput.addEventListener('input', render);
    refreshBtn.addEventListener('click', loadOverview);

    // ================== INIT ==================
    loadOverview().then(() => {
      // SSE Realtime
      const es = new EventSource('/events');
      es.onmessage = () => loadOverview();
      es.onerror = () => liveText.textContent = 'Mất kết nối realtime';
    }).catch(err => {
      cardsEl.innerHTML = `<div class="empty">Lỗi tải dữ liệu: ${escapeHtml(err.message)}</div>`;
    });
  </script>
</body>
</html>
